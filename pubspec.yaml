name: amoeba_grid
description: >-
  Dashboard cards that behave like amoebas - reshape into polyomino
  silhouettes, push through each other, and remember their layout.
version: 0.2.0
repository: https://github.com/SupposedlySam/amoeba_grid
topics:
  - grid
  - dashboard
  - drag-and-drop
  - layout
  - widgets
screenshots:
  - description: Bento dashboard built with amoeba_grid on macOS
    path: doc/hero.png

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
