name: fluid_draggable_grid
description: >-
  A fluid, draggable dashboard grid. Cards reshape strip-by-strip into
  organic polyomino silhouettes, push through each other amoeba-style, and
  persist user shaping per viewport breakpoint.
version: 0.1.0
repository: https://github.com/SupposedlySam/fluid_draggable_grid

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
